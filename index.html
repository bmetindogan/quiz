<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Bana Uygun Toprağı Bul - Minik Orman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fbf9f4;
            padding: 2rem 1rem;

        }
        .container { max-width: 650px; margin: 0 auto; }
        h1 { 
            font-family: 'Georgia', serif;
            font-size: clamp(28px, 5vw, 36px);

            text-align: center;
            margin-bottom: 0.5rem;

        }
        .subtitle {

            margin-bottom: 2.5rem;

        }
        .progress-wrap {

            border-radius: 10px;

            overflow: hidden;
        }
        .progress-bar {
            background: #37563b;

        }
        .progress-label {
            text-align: right;
            font-size: 12px;
            color: #888;
            margin-bottom: 1.5rem;
        }
        .question-box {
            background: #fff;
            padding: 1.8rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #e4e2dd;
        }
        .question-box h2 {
            font-family: 'Georgia', serif;
            font-size: 19px;
            color: #37563b;

        }
        .option {

            border: 2px solid transparent;

            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;

            align-items: center;
            gap: 10px;
        }
        .option:hover { border-color: #37563b; background: #fff; }
        .option.selected { border-color: #37563b; background: #fff; }
        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #37563b;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 15px;
            color: #1b1c19;
        }
        .result {
            display: none;
            text-align: center;
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid #e4e2dd;
        }
        .result h2 {
            font-family: 'Georgia', serif;
            color: #37563b;
            margin-bottom: 0.5rem;
            font-size: 22px;
        }
        .result-subtitle {
            color: #424841;
            font-size: 14px;
            margin-bottom: 2rem;
        }
        .product-box {
            background: #f5f3ee;
            padding: 1.8rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .product-box h3 {
            font-family: 'Georgia', serif;

        }

        }
        .buy-btn {

            color: #fff;

            border: none;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .buy-btn:hover { background: #4f6f52; }
        .back-btn {
            display: block;
            background: transparent;
            color: #37563b;
            border: 1px solid #c2c8bf;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin: 1rem auto 0;
            width: fit-content;
        }
        .back-btn:hover { background: #f5f3ee; border-color: #37563b; }
    </style>
</head>
<body>

// Her node: { q, options: [{text, next}] }
// next başında "result_" varsa sonuç göster
const flow = {
    start: {
        q: "Bitkini nerede yetiştiriyorsun?",

            { text: "Tropikal devler (Monstera, Philodendron, Anthurium…)", next: "ic_tropik_boyut" },

    // Genel ev bitkisi

        ]
    },
    ic_genel_fide_su: {

        options: [
            { text: "Sık sık (haftada 2–3 kez)", next: "result_kok" },
            { text: "Orta (haftada 1 kez)", next: "result_kok" },
            { text: "Seyrek (15+ günde 1 kez)", next: "result_kok" }
        ]
    },
    ic_genel_normal_su: {
        q: "Ne sıklıkla su veriyorsun?",
        options: [
            { text: "Sık sık (haftada 2–3 kez)", next: "result_sihirli" },
            { text: "Orta (haftada 1 kez)", next: "result_sihirli" },
            { text: "Seyrek (15+ günde 1 kez)", next: "result_sihirli" }
        ]
    },

    // Tropikal
    ic_tropik_boyut: {
        q: "Bitkin ne kadar büyük?",
        options: [
            { text: "Çok küçük / Çelik / Fide aşamasında", next: "ic_tropik_fide_su" },
            { text: "Küçük / Orta saksı (0,5–10 L)", next: "ic_tropik_kucuk_su" },
            { text: "Büyük saksı (10 L+)", next: "ic_tropik_buyuk_su" }
        ]
    },
    ic_tropik_fide_su: {
        q: "Ne sıklıkla su veriyorsun?",
        options: [
            { text: "Sık sık (haftada 2–3 kez)", next: "result_kok" },
            { text: "Orta (haftada 1 kez)", next: "result_kok" },
            { text: "Seyrek (15+ günde 1 kez)", next: "result_kok" }

    },
    ic_tropik_kucuk_su: {

    ic_tropik_buyuk_su: {

        options: [

            { text: "Orta (haftada 1 kez)", next: "result_tropik" },
            { text: "Seyrek (15+ günde 1 kez)", next: "result_tropik" }
        ]

    // Kaktüs / Succulent
    ic_kaktus_boyut: {
        q: "Bitkin ne kadar büyük?",
        options: [
            { text: "Küçük / Orta saksı (0,5–10 L)", next: "ic_kaktus_su" },
            { text: "Büyük saksı (10 L+)", next: "ic_kaktus_su" }

    ic_kaktus_su: {

            { text: "Küçük saksı (0,5–3 L)", next: "ic_orkide_su" },
            { text: "Orta saksı (3–10 L)", next: "ic_orkide_su" },
            { text: "Büyük saksı (10 L+)", next: "ic_orkide_su" }
        ]
    },
    ic_orkide_su: {
        q: "Ne sıklıkla su veriyorsun?",
        options: [
            { text: "Sık sık (haftada 2–3 kez)", next: "result_orkide" },
            { text: "Orta (haftada 1 kez)", next: "result_orkide" },
            { text: "Seyrek (15+ günde 1 kez)", next: "result_orkide" }
        ]
    },

    // Epifit / Hava köklü
    ic_epifit_boyut: {

        options: [

            { text: "Büyük saksı (10 L+)", next: "ic_epifit_isik" }
        ]
    },
    ic_epifit_isik: {
        q: "Bitkin ne kadar ışık alıyor?",
        options: [
            { text: "Parlak dolaylı ışık", next: "result_hava" },
            { text: "Orta ışık", next: "result_hava" },
            { text: "Az ışık", next: "result_hava" }
        ]
    },

    // Palmiye / Ağaç
    ic_agac_boyut: {
        q: "Bitkin ne kadar büyük?",
        options: [
            { text: "Orta saksı (3–10 L)", next: "ic_agac_isik" },
            { text: "Büyük saksı / Kadı (10 L+)", next: "ic_agac_buyuk_isik" }

    dis_mevsim_iklim: {

            { text: "Sıcak ve kurak", next: "result_mevsim" },
            { text: "Nemli ve yağışlı", next: "result_mevsim" },
            { text: "Rüzgarlı / Açık alan", next: "result_mevsim" }
        ]
    },

    // Aromatik / Süs çayırı
    dis_ruzgar_ortam: {
        q: "Nerede yetiştiriyorsun?",
        options: [
            { text: "Saksı / Balkon kasası", next: "dis_ruzgar_iklim" },
            { text: "Açık toprak / Bahçe", next: "dis_ruzgar_iklim" }
        ]
    },
    dis_ruzgar_iklim: {
        q: "Bölgenin iklimi nasıl?",
        options: [
            { text: "Sıcak ve kurak", next: "result_ruzgar" },
            { text: "Nemli ve yağışlı", next: "result_ruzgar" },
            { text: "Rüzgarlı / Açık alan", next: "result_ruzgar" }
        ]
    },

    // Süs bitkisi
    dis_sus_ortam: {
        q: "Nerede yetiştiriyorsun?",
        options: [
            { text: "Saksı / Balkon kasası", next: "dis_sus_iklim" },

        ]
    },

        q: "Bölgenin iklimi nasıl?",
        options: [
            { text: "Sıcak ve kurak", next: "result_guclu" },

            { text: "Rüzgarlı / Açık alan", next: "result_guclu" }
        ]
    }
};

let stepNum = 0;
const TOTAL = 4;

function render(key) {
    const node = flow[key];
    if (!node) return;

    stepNum++;
    const pct = Math.min((stepNum / TOTAL) * 100, 100);
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('progress-label').textContent = 'Soru ' + stepNum + ' / ' + TOTAL;

    const html = `
        <div class="question-box">
            <h2>${node.q}</h2>
            ${node.options.map((o, i) => `
                <div class="option" id="opt-wrap-${i}" onclick="choose('${o.next}', ${i})">
                    <input type="radio" name="q" id="opt${i}">
                    <label for="opt${i}">${o.text}</label>
                </div>
            `).join('')}
        </div>`;
    document.getElementById('quiz').innerHTML = html;
    window.scrollTo(0, 0);
}

function choose(next, idx) {
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    document.getElementById('opt-wrap-' + idx).classList.add('selected');
    setTimeout(() => {
        if (next.startsWith('result_')) {
            showResult(next.replace('result_', ''));
        } else {
            render(next);
        }
    }, 280);
}

function showResult(key) {
    const p = products[key];
    document.getElementById('progress').style.width = '100%';
    document.getElementById('progress-label').textContent = 'Tamamlandı';
    document.getElementById('quiz').style.display = 'none';

    const el = document.getElementById('result');
    el.style.display = 'block';
    el.innerHTML = `
        <h2>Sana En Uygun Toprak Karışımı</h2>
        <p class="result-subtitle">Bitkinin için ideal substrat</p>
        <div class="product-box">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
        </div>
        <a href="${p.url}" class="buy-btn" target="_blank">Satın Al →</a>
        <button class="back-btn" onclick="location.reload()">← Baştan Başla</button>
    `;
    window.scrollTo(0, 0);
}

render('start');
</script>
</body>
</html>
