<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bana Uygun Toprağı Bul - Minik Orman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fbf9f4;
            padding: 2rem 1rem;
            min-height: 100vh;
        }
        .container { max-width: 650px; margin: 0 auto; }
        h1 { 
            font-family: 'Georgia', serif;
            font-size: clamp(28px, 5vw, 36px);
            color: #37563b;
            text-align: center;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        .subtitle {
            text-align: center;
            color: #424841;
            margin-bottom: 2.5rem;
            font-size: 15px;
        }
        .progress {
            background: #e4e2dd;
            height: 6px;
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-bar {
            background: #37563b;
            height: 100%;
            transition: width 0.3s;
        }
        .question-box {
            background: #fff;
            padding: 1.8rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #e4e2dd;
        }
        .question-box h2 {
            font-family: 'Georgia', serif;
            font-size: 19px;
            color: #37563b;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }
        .option {
            background: #f5f3ee;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option:hover {
            border-color: #37563b;
            background: #fff;
        }
        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #37563b;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 15px;
            color: #1b1c19;
        }
        button {
            display: block;
            width: 100%;
            background: #37563b;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        button:hover { background: #4f6f52; }
        button:disabled { 
            background: #c2c8bf; 
            cursor: not-allowed; 
        }
        .result {
            display: none;
            text-align: center;
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid #e4e2dd;
        }
        .result h2 {
            font-family: 'Georgia', serif;
            color: #37563b;
            margin-bottom: 0.5rem;
            font-size: 22px;
        }
        .result-subtitle {
            color: #424841;
            font-size: 14px;
            margin-bottom: 2rem;
        }
        .product-box {
            background: #f5f3ee;
            padding: 1.8rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .product-box h3 {
            font-family: 'Georgia', serif;
            font-size: 20px;
            color: #37563b;
            margin-bottom: 0.8rem;
        }
        .product-box p {
            font-size: 14px;
            color: #424841;
            line-height: 1.6;
        }
        .buy-btn {
            background: #37563b;
            color: #fff;
            padding: 14px 36px;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .buy-btn:hover { background: #4f6f52; }
        .back-btn {
            background: transparent;
            color: #37563b;
            border: 1px solid #c2c8bf;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 1rem;
        }
        .back-btn:hover { 
            background: #f5f3ee; 
            border-color: #37563b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bana Uygun Toprağı Bul</h1>
        <p class="subtitle">Birkaç soruya cevap ver, sana en uygun toprak karışımını önerelim</p>
        
        <div class="progress"><div class="progress-bar" id="progress"></div></div>
        
        <div id="quiz"></div>
        <div id="result" class="result"></div>
    </div>

    <script>
        const products = {
            "sihirli": { 
                name: "Sihirli Toprak – Universal Mix", 
                url: "https://www.minikormanbotanik.com/products/sihirli-toprak-genel-kullanim-icin-ozel-toprak-karisimi", 
                desc: "Popüler iç mekan bitkileri için güvenli ve dengeli bir temel. Hafif, havadar ve nem tutma dengesi mükemmel." 
            },
            "yesil": { 
                name: "Yeşil Gövdeler – Aroid Mix", 
                url: "https://www.minikormanbotanik.com/products/yesil-govdeler-aroid-mix", 
                desc: "Büyük yapraklı tropik bitkiler için özel olarak geliştirilmiş karışım. Hafif, havadar ve nem tutma kapasitesi yüksek." 
            },
            "tropik": { 
                name: "Tropik Güç – Profesyonel Aroid Substrat", 
                url: "https://www.minikormanbotanik.com/products/tropik-guc-guclu-ve-yetiskin-aroid-bitkiler-icin-substrat", 
                desc: "Zorlu ve hassas aroid türleri için geliştirilmiş çok bileşenli profesyonel substrat. Yüksek hava geçirgenliği, kontrollü nem dengesi." 
            },
            "col": { 
                name: "Çöl Esintisi – Succulent Mix", 
                url: "https://www.minikormanbotanik.com/products/col-esintisi-succulent-mix", 
                desc: "Çöl kökenli bitkilerin doğal ortamını taklit eder: hızlı kurur, suyu tutmaz, köklerin nefes almasını sağlar." 
            },
            "orkide": { 
                name: "Orkide Işıltısı", 
                url: "https://www.minikormanbotanik.com/products/orkide-isiltisi", 
                desc: "Epifit orkideler için özel olarak formüle edilmiş profesyonel bir karışım. Hafif yapısı sayesinde fazla suyu tutmaz." 
            },
            "hava": { 
                name: "Hava Kökleri – Epifit Mix", 
                url: "https://www.minikormanbotanik.com/products/hava-kokleri", 
                desc: "Doğada ağaçlarda ya da kaya yüzeylerinde yaşayan, hava köklü bitkiler için özel geliştirilmiştir." 
            },
            "dogal": { 
                name: "Doğal Gövde – Palmiye Substratı", 
                url: "https://www.minikormanbotanik.com/products/dogal-govde", 
                desc: "Palmiye ve ağaç formundaki bitkiler için hazırlanmış sade ve dengeli bir substrat." 
            },
            "guclu": { 
                name: "Güçlü Gövde – Büyük Saksı Substratı", 
                url: "https://www.minikormanbotanik.com/products/guclu-govde", 
                desc: "Büyük saksılar, kadılar ve uzun süreli yetiştiricilik için geliştirilmiş çok bileşenli substrat." 
            },
            "kok": { 
                name: "Kök Sihri – Çelik & Fide Karışımı", 
                url: "https://www.minikormanbotanik.com/products/kok-sihri", 
                desc: "Köklenme sürecinde olan çelikler ve genç fideler için özel hazırlanmış steril ve dengeli karışım." 
            },
            "mevsim": { 
                name: "Mevsim Çiçeği – Balkon Substratı", 
                url: "https://www.minikormanbotanik.com/products/mevsim-cicegi", 
                desc: "Tek yıllık balkon çiçekleri için hazırlanmış hafif ve dengeli substrat. Hızlı köklenmeyi destekler." 
            },
            "ruzgar": { 
                name: "Rüzgar Bahçesi – Dış Mekan Karışımı", 
                url: "https://www.minikormanbotanik.com/products/ruzgar-bahcesi", 
                desc: "Dış mekanda yetiştirilen süs çayırları, aromatik ve çok yıllık bitkiler için özel geliştirilmiştir." 
            }
        };

        let path = "";
        let currentStep = 0;
        let totalSteps = 5;

        const quizFlow = {
            "start": {
                q: "Bitkini nerede yetiştiriyorsun?",
                options: [
                    { text: "İç Mekan", next: "ic_grup" },
                    { text: "Dış Mekan", next: "dis_grup" }
                ]
            },
            "ic_grup": {
                q: "Bitkin hangi gruba ait?",
                options: [
                    { text: "Genel ev bitkileri (Ficus, Pothos, Calathea)", next: "ic_buyukluk_genel" },
                    { text: "Tropikal devler (Monstera, Philodendron, Anthurium)", next: "ic_buyukluk_tropik" },
                    { text: "Kaktüs ve Succulents", next: "result_col" },
                    { text: "Orkideler", next: "result_orkide" },
                    { text: "Epifit/Hava köklü bitkiler (Hoya, Tillandsia)", next: "result_hava" },
                    { text: "Palmiye veya ağaç formunda bitkiler", next: "ic_buyukluk_agac" }
                ]
            },
            "ic_buyukluk_genel": {
                q: "Bitkin ne kadar büyük?",
                options: [
                    { text: "Çok küçük / Çelik / Fide aşamasında", next: "result_kok" },
                    { text: "Küçük saksı (0.5-3L)", next: "result_sihirli" },
                    { text: "Orta saksı (3-10L)", next: "result_sihirli" },
                    { text: "Büyük saksı (10L+)", next: "result_sihirli" }
                ]
            },
            "ic_buyukluk_tropik": {
                q: "Bitkin ne kadar büyük?",
                options: [
                    { text: "Çok küçük / Çelik / Fide aşamasında", next: "result_kok" },
                    { text: "Küçük/Orta saksı (0.5-10L)", next: "result_yesil" },
                    { text: "Büyük saksı (10L+)", next: "result_tropik" }
                ]
            },
            "ic_buyukluk_agac": {
                q: "Bitkin ne kadar büyük?",
                options: [
                    { text: "Orta saksı (3-10L)", next: "result_dogal" },
                    { text: "Büyük saksı/kadı (10L+)", next: "result_guclu" }
                ]
            },
            "dis_grup": {
                q: "Ne yetiştiriyorsun?",
                options: [
                    { text: "Mevsimlik çiçekler (Petunya, Menekşe, Lobelya)", next: "result_mevsim" },
                    { text: "Aromatik/Süs çayırları (Lavanta, Biberiye, Kekik)", next: "result_ruzgar" },
                    { text: "Palmiye veya ağaç (açık havada)", next: "dis_agac_buyukluk" },
                    { text: "Süs bitkileri (Ortanca, Gül, Cennet Kuşu)", next: "result_ruzgar" }
                ]
            },
            "dis_agac_buyukluk": {
                q: "Ne kadar büyük bir saksı/alan?",
                options: [
                    { text: "Orta saksı (3-10L)", next: "result_dogal" },
                    { text: "Büyük kadı veya açık toprak", next: "result_guclu" }
                ]
            }
        };

        function render(step) {
            const quiz = document.getElementById('quiz');
            const data = quizFlow[step];
            
            if (!data) return;
            
            currentStep++;
            updateProgress();
            
            let html = `<div class="question-box"><h2>${data.q}</h2>`;
            data.options.forEach((opt, i) => {
                html += `
                    <div class="option" onclick="select('${opt.next}', this)">
                        <input type="radio" name="q" id="opt${i}" value="${opt.next}">
                        <label for="opt${i}">${opt.text}</label>
                    </div>
                `;
            });
            html += `</div>`;
            
            quiz.innerHTML = html;
            window.scrollTo(0, 0);
        }

        function select(next, elem) {
            document.querySelectorAll('.option').forEach(o => o.style.borderColor = 'transparent');
            elem.style.borderColor = '#37563b';
            
            setTimeout(() => {
                if (next.startsWith('result_')) {
                    showResult(next.replace('result_', ''));
                } else {
                    render(next);
                }
            }, 300);
        }

        function showResult(key) {
            const product = products[key];
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('progress').parentElement.style.display = 'none';
            const result = document.getElementById('result');
            result.style.display = 'block';
            result.innerHTML = `
                <h2>Sana En Uygun Toprak Karışımı</h2>
                <p class="result-subtitle">Bitkinin için ideal substrat</p>
                <div class="product-box">
                    <h3>${product.name}</h3>
                    <p>${product.desc}</p>
                </div>
                <a href="${product.url}" class="buy-btn">Satın Al →</a>
                <button class="back-btn" onclick="location.reload()">← Baştan Başla</button>
            `;
            window.scrollTo(0, 0);
        }

        function updateProgress() {
            const percent = (currentStep / totalSteps) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        render('start');
    </script>
</body>
</html>
